<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Raccoglitore</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold: #c9a84c;
  --gold-light: #e8cc80;
  --leather-mid: #2e1a0a;
  --text: #f0e6d3;
}

html, body {
  min-height: 100%;
  background: radial-gradient(ellipse at center, #1a1530 0%, #0a0910 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Cinzel', serif;
  color: var(--text);
  overscroll-behavior: none;
  padding: 16px 0;
}

#binder {
  width: min(400px, 94vw);
  background: var(--leather-mid);
  border-radius: 4px 14px 14px 4px;
  padding: 16px 14px 12px 28px;
  position: relative;
  box-shadow: 6px 6px 24px rgba(0,0,0,0.8);
}

/* dorso sinistra */
#binder::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0; width: 20px;
  background: linear-gradient(90deg, #0d0704, #1a0c05, #0d0704);
  border-radius: 4px 0 0 4px;
}

/* ── ANELLI REALISTICI: elementi SVG inline ── */
.rings {
  position: absolute;
  left: 2px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 28px;
  z-index: 2;
}
.ring {
  width: 16px;
  height: 20px;
  position: relative;
}
.ring svg {
  width: 100%;
  height: 100%;
  overflow: visible;
}

.page-bg {
  background: linear-gradient(180deg, #0e0d14 0%, #12111a 100%);
  border-radius: 4px 8px 8px 4px;
  padding: 12px;
}

#page {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.sleeve {
  background: rgba(200,180,140,0.07);
  border: 1px solid rgba(201,168,76,0.22);
  border-radius: 8px;
  aspect-ratio: 5/7;
  overflow: hidden;
  cursor: pointer;
  position: relative;
  background-image: linear-gradient(155deg, rgba(255,255,255,0.07) 0%, transparent 45%);
  transition: transform 0.18s;
  -webkit-tap-highlight-color: transparent;
}
.sleeve:active { transform: scale(0.95); }
.sleeve img {
  width: 100%; height: 100%;
  object-fit: cover;
  border-radius: 6px;
  display: block;
}
.sleeve.empty {
  cursor: default;
  opacity: 0.2;
  pointer-events: none;
}

#nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 12px;
}
.nav-btn {
  background: rgba(201,168,76,0.1);
  border: 1px solid rgba(201,168,76,0.28);
  color: var(--gold-light);
  border-radius: 8px;
  width: 52px; height: 52px;
  font-size: 22px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.15s;
}
.nav-btn:active { background: rgba(201,168,76,0.28); }
.nav-btn:disabled { opacity: 0.2; pointer-events: none; }
#page-indicator { font-size: 12px; color: rgba(201,168,76,0.55); letter-spacing: 0.1em; }

/* ── OVERLAY ── */
#overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
  pointer-events: none;
  transition: background 0.3s;
}
#overlay.open { background: rgba(0,0,0,0.92); pointer-events: all; }

#overlay-card {
  width: min(300px, 78vw); aspect-ratio: 5/7;
  border-radius: 10px; overflow: hidden;
  transform: scale(0.5); opacity: 0;
  transition: transform 0.35s cubic-bezier(0.34, 1.45, 0.64, 1), opacity 0.25s ease;
  box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 0 1px rgba(201,168,76,0.2);
  /* FIX bug 2: nessun background residuo */
  background: transparent;
}
#overlay.open #overlay-card { transform: scale(1); opacity: 1; }
#overlay-card img { width: 100%; height: 100%; object-fit: cover; display: block; }

/* FIX bug 1: frecce overlay visibili solo quando overlay è aperto */
.ov-arrow {
  position: fixed; top: 50%; transform: translateY(-50%);
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
  color: white; font-size: 24px; width: 44px; height: 64px;
  border-radius: 8px; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, opacity 0.3s; z-index: 101;
  opacity: 0;
  pointer-events: none;
}
#overlay.open .ov-arrow { opacity: 1; pointer-events: all; }
.ov-arrow:active { background: rgba(255,255,255,0.25); }
.ov-arrow:disabled { opacity: 0.15 !important; pointer-events: none; }
#ov-prev { left: 8px; } #ov-next { right: 8px; }

#ov-close {
  position: fixed; top: 16px; right: 16px;
  background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
  color: white; font-size: 18px; width: 42px; height: 42px;
  border-radius: 50%; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  display: flex; align-items: center; justify-content: center;
  z-index: 102; transition: background 0.15s;
}
#ov-close:active { background: rgba(255,255,255,0.3); }

#ov-counter {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  font-size: 12px; color: rgba(255,255,255,0.4); letter-spacing: 0.1em; z-index: 102;
}

#empty-msg {
  display: none;
  text-align: center;
  padding: 40px 20px;
  color: rgba(201,168,76,0.4);
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: 15px;
  line-height: 1.7;
}
</style>
</head>
<body>

<div id="binder">
  <!-- FIX bug 3: anelli realistici come SVG -->
  <div class="rings">
    <div class="ring">
      <svg viewBox="-2 -3 20 26" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="rg" cx="38%" cy="35%" r="60%">
            <stop offset="0%"   stop-color="#e8e8e8"/>
            <stop offset="40%"  stop-color="#b0b0b0"/>
            <stop offset="75%"  stop-color="#707070"/>
            <stop offset="100%" stop-color="#404040"/>
          </radialGradient>
          <radialGradient id="rg-inner" cx="50%" cy="50%" r="50%">
            <stop offset="0%"   stop-color="#1a0c05"/>
            <stop offset="100%" stop-color="#0d0704"/>
          </radialGradient>
        </defs>
        <!-- corpo anello -->
        <ellipse cx="8" cy="10" rx="7" ry="9" fill="url(#rg)" />
        <!-- foro interno -->
        <ellipse cx="8" cy="10" rx="4" ry="6" fill="url(#rg-inner)" />
        <!-- riflesso luce -->
        <ellipse cx="5.5" cy="6.5" rx="1.8" ry="2.5" fill="rgba(255,255,255,0.35)" />
        <!-- ombra sotto -->
        <ellipse cx="8" cy="19.5" rx="6" ry="1.5" fill="rgba(0,0,0,0.4)" />
      </svg>
    </div>
    <div class="ring">
      <svg viewBox="-2 -3 20 26" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="rg2" cx="38%" cy="35%" r="60%">
            <stop offset="0%"   stop-color="#e8e8e8"/>
            <stop offset="40%"  stop-color="#b0b0b0"/>
            <stop offset="75%"  stop-color="#707070"/>
            <stop offset="100%" stop-color="#404040"/>
          </radialGradient>
          <radialGradient id="rg2-inner" cx="50%" cy="50%" r="50%">
            <stop offset="0%"   stop-color="#1a0c05"/>
            <stop offset="100%" stop-color="#0d0704"/>
          </radialGradient>
        </defs>
        <ellipse cx="8" cy="10" rx="7" ry="9" fill="url(#rg2)" />
        <ellipse cx="8" cy="10" rx="4" ry="6" fill="url(#rg2-inner)" />
        <ellipse cx="5.5" cy="6.5" rx="1.8" ry="2.5" fill="rgba(255,255,255,0.35)" />
        <ellipse cx="8" cy="19.5" rx="6" ry="1.5" fill="rgba(0,0,0,0.4)" />
      </svg>
    </div>
    <div class="ring">
      <svg viewBox="-2 -3 20 26" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="rg3" cx="38%" cy="35%" r="60%">
            <stop offset="0%"   stop-color="#e8e8e8"/>
            <stop offset="40%"  stop-color="#b0b0b0"/>
            <stop offset="75%"  stop-color="#707070"/>
            <stop offset="100%" stop-color="#404040"/>
          </radialGradient>
          <radialGradient id="rg3-inner" cx="50%" cy="50%" r="50%">
            <stop offset="0%"   stop-color="#1a0c05"/>
            <stop offset="100%" stop-color="#0d0704"/>
          </radialGradient>
        </defs>
        <ellipse cx="8" cy="10" rx="7" ry="9" fill="url(#rg3)" />
        <ellipse cx="8" cy="10" rx="4" ry="6" fill="url(#rg3-inner)" />
        <ellipse cx="5.5" cy="6.5" rx="1.8" ry="2.5" fill="rgba(255,255,255,0.35)" />
        <ellipse cx="8" cy="19.5" rx="6" ry="1.5" fill="rgba(0,0,0,0.4)" />
      </svg>
    </div>
  </div>

  <div class="page-bg">
    <div id="page"></div>
    <div id="empty-msg">Nessuna carta trovata.<br>Metti le immagini nella cartella <code>/Carte/</code><br>con nomi <code>carta_01.jpg</code>, <code>carta_02.jpg</code>…</div>
  </div>
  <div id="nav">
    <button class="nav-btn" id="prev-btn">&#8592;</button>
    <span id="page-indicator"></span>
    <button class="nav-btn" id="next-btn">&#8594;</button>
  </div>
</div>

<!-- OVERLAY -->
<div id="overlay">
  <button class="ov-arrow" id="ov-prev">&#8592;</button>
  <div id="overlay-card"></div>
  <button class="ov-arrow" id="ov-next">&#8594;</button>
  <button id="ov-close">&#10005;</button>
  <span id="ov-counter"></span>
</div>

<script>
const PER_PAGE = 4;
const EXTENSIONS = ['jpg', 'jpeg', 'png', 'webp', 'gif', 'svg'];

let CARTE = [];
let page = 0;
let ovIdx = 0;

function probeCard(n) {
  const name = `carta_${String(n).padStart(2, '0')}`;
  return new Promise(resolve => {
    let i = 0;
    function tryNext() {
      if (i >= EXTENSIONS.length) { resolve(null); return; }
      const ext = EXTENSIONS[i++];
      const img = new Image();
      img.onload  = () => resolve(`Carte/${name}.${ext}`);
      img.onerror = tryNext;
      img.src = `Carte/${name}.${ext}`;
    }
    tryNext();
  });
}

async function discoverCarte() {
  let n = 1;
  while (true) {
    const src = await probeCard(n);
    if (!src) break;
    CARTE.push(src);
    n++;
  }
}

function renderPage() {
  const grid = document.getElementById('page');
  grid.innerHTML = '';

  const start = page * PER_PAGE;
  const totalPages = Math.ceil(CARTE.length / PER_PAGE);
  const slice = CARTE.slice(start, start + PER_PAGE);

  for (let i = 0; i < PER_PAGE; i++) {
    const sleeve = document.createElement('div');
    sleeve.className = 'sleeve';
    if (slice[i]) {
      const img = document.createElement('img');
      img.src = slice[i];
      img.alt = '';
      sleeve.appendChild(img);
      const idx = start + i;
      sleeve.addEventListener('click', () => openOverlay(idx));
    } else {
      sleeve.classList.add('empty');
    }
    grid.appendChild(sleeve);
  }

  document.getElementById('page-indicator').textContent =
    CARTE.length ? `${page + 1} / ${totalPages}` : '';
  document.getElementById('prev-btn').disabled = page === 0;
  document.getElementById('next-btn').disabled = page >= totalPages - 1;
}

function openOverlay(idx) {
  ovIdx = idx;
  renderOverlayCard();
  document.getElementById('overlay').classList.add('open');
}

function closeOverlay() {
  const overlay = document.getElementById('overlay');
  overlay.classList.remove('open');
  // FIX bug 2: svuota il card DOPO la transizione, così non resta il rettangolo
  setTimeout(() => {
    const card = document.getElementById('overlay-card');
    card.innerHTML = '';
    card.style.cssText = '';
  }, 400);
}

function renderOverlayCard() {
  const card = document.getElementById('overlay-card');
  card.innerHTML = '';
  // reset senza transition
  card.style.transition = 'none';
  card.style.opacity = '0';
  card.style.transform = 'scale(0.85)';

  const img = document.createElement('img');
  img.src = CARTE[ovIdx];
  img.alt = '';
  card.appendChild(img);

  requestAnimationFrame(() => requestAnimationFrame(() => {
    card.style.transition = 'transform 0.3s cubic-bezier(0.34,1.3,0.64,1), opacity 0.2s ease';
    card.style.opacity = '1';
    card.style.transform = 'scale(1)';
  }));

  document.getElementById('ov-counter').textContent = `${ovIdx + 1} / ${CARTE.length}`;
  document.getElementById('ov-prev').disabled = ovIdx === 0;
  document.getElementById('ov-next').disabled = ovIdx === CARTE.length - 1;
}

document.getElementById('prev-btn').onclick = () => { page--; renderPage(); };
document.getElementById('next-btn').onclick = () => { page++; renderPage(); };

let binderTx = 0;
document.getElementById('binder').addEventListener('touchstart', e => {
  binderTx = e.touches[0].clientX;
}, { passive: true });
document.getElementById('binder').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - binderTx;
  if (Math.abs(dx) < 40) return;
  const totalPages = Math.ceil(CARTE.length / PER_PAGE);
  if (dx < 0 && page < totalPages - 1) { page++; renderPage(); }
  if (dx > 0 && page > 0)              { page--; renderPage(); }
});

document.getElementById('ov-close').onclick = closeOverlay;
document.getElementById('ov-prev').onclick = () => { ovIdx--; renderOverlayCard(); };
document.getElementById('ov-next').onclick = () => { ovIdx++; renderOverlayCard(); };
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeOverlay();
});

let ovTx = 0;
document.getElementById('overlay').addEventListener('touchstart', e => {
  ovTx = e.touches[0].clientX;
}, { passive: true });
document.getElementById('overlay').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - ovTx;
  if (Math.abs(dx) < 40) return;
  if (dx < 0 && ovIdx < CARTE.length - 1) { ovIdx++; renderOverlayCard(); }
  if (dx > 0 && ovIdx > 0)                { ovIdx--; renderOverlayCard(); }
});

(async () => {
  await discoverCarte();
  if (!CARTE.length) {
    document.getElementById('empty-msg').style.display = 'block';
    document.getElementById('nav').style.display = 'none';
  } else {
    renderPage();
  }
})();
</script>
</body>
</html>
