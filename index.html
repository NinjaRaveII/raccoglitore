<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Raccoglitore</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
/* ── RESET & BASE ───────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --leather-dark:  #1c0f07;
  --leather-mid:   #2e1a0a;
  --leather-light: #4a2c12;
  --gold:          #c9a84c;
  --gold-light:    #e8cc80;
  --velvet:        #12111a;
  --text:          #f0e6d3;
  --sleeve-bg:     rgba(200,180,140,0.08);
  --sleeve-border: rgba(201,168,76,0.25);
}

html, body {
  height: 100%;
  background: radial-gradient(ellipse at center, #1a1530 0%, #0a0910 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Cinzel', serif;
  color: var(--text);
  overflow: hidden;
  overscroll-behavior: none;
}

/* ── SCENE (3D container) ───────────────────────────── */
#scene {
  perspective: 1200px;
  width: min(420px, 96vw);
}

/* ── COVER ──────────────────────────────────────────── */
#cover-wrap {
  position: absolute;
  width: min(420px, 96vw);
  transform-origin: left center;
  transform-style: preserve-3d;
  transition: transform 0.75s cubic-bezier(0.4, 0, 0.2, 1);
  cursor: pointer;
  z-index: 10;
  /* vertically center in viewport */
  top: 50%;
  left: 50%;
  transform: translateX(-50%) translateY(-50%);
}
#cover-wrap.opened {
  transform: translateX(-50%) translateY(-50%) rotateY(-180deg);
  pointer-events: none;
}

#cover {
  background: var(--leather-dark);
  border-radius: 4px 14px 14px 4px;
  padding: 28px 20px;
  min-height: 560px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  box-shadow:
    6px 6px 24px rgba(0,0,0,0.8),
    inset -2px 0 8px rgba(0,0,0,0.5);
  /* leather grain texture via repeating gradient */
  background-image:
    repeating-linear-gradient(
      45deg,
      transparent,
      transparent 2px,
      rgba(255,255,255,0.012) 2px,
      rgba(255,255,255,0.012) 4px
    ),
    linear-gradient(180deg, #251408 0%, #1c0f07 50%, #251408 100%);
}

/* spine */
#cover::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 20px;
  background: linear-gradient(90deg, #0d0704, #1a0c05, #0d0704);
  border-radius: 4px 0 0 4px;
}

/* rings decoration */
#cover::after {
  content: '';
  position: absolute;
  left: 4px;
  top: 50%;
  transform: translateY(-50%);
  width: 12px;
  height: 160px;
  background:
    radial-gradient(ellipse 6px 8px at 50% 16%, #888 60%, transparent 100%),
    radial-gradient(ellipse 6px 8px at 50% 50%, #888 60%, transparent 100%),
    radial-gradient(ellipse 6px 8px at 50% 84%, #888 60%, transparent 100%);
}

.cover-border {
  position: absolute;
  inset: 14px;
  border: 1px solid var(--gold);
  border-radius: 8px;
  pointer-events: none;
  opacity: 0.5;
}
.cover-border-inner {
  position: absolute;
  inset: 18px;
  border: 1px solid var(--gold);
  border-radius: 6px;
  pointer-events: none;
  opacity: 0.2;
}

.cover-title {
  font-family: 'Cinzel', serif;
  font-size: clamp(22px, 6vw, 30px);
  font-weight: 600;
  color: var(--gold);
  text-align: center;
  letter-spacing: 0.12em;
  text-shadow: 0 0 20px rgba(201,168,76,0.4);
  line-height: 1.4;
  position: relative;
  z-index: 1;
}
.cover-subtitle {
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: 13px;
  color: rgba(201,168,76,0.6);
  margin-top: 10px;
  letter-spacing: 0.05em;
}
.cover-ornament {
  font-size: 36px;
  color: var(--gold);
  opacity: 0.5;
  margin: 14px 0;
  line-height: 1;
}
.cover-hint {
  position: absolute;
  bottom: 28px;
  font-size: 11px;
  color: rgba(240,230,211,0.35);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

/* ── BINDER (pages, hidden until cover opens) ───────── */
#binder {
  background: var(--leather-mid);
  border-radius: 4px 14px 14px 4px;
  padding: 18px 16px 14px 26px;
  min-height: 560px;
  position: relative;
  box-shadow:
    6px 6px 24px rgba(0,0,0,0.8),
    inset -2px 0 6px rgba(0,0,0,0.4);
  display: flex;
  flex-direction: column;
  opacity: 0;
  transition: opacity 0.4s ease 0.4s;
}
#binder.visible { opacity: 1; }

/* spine */
#binder::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 20px;
  background: linear-gradient(90deg, #0d0704, #1a0c05, #0d0704);
  border-radius: 4px 0 0 4px;
}
/* ring holes */
#binder::after {
  content: '';
  position: absolute;
  left: 4px;
  top: 50%;
  transform: translateY(-50%);
  width: 12px;
  height: 160px;
  background:
    radial-gradient(ellipse 6px 8px at 50% 16%, #888 60%, transparent 100%),
    radial-gradient(ellipse 6px 8px at 50% 50%, #888 60%, transparent 100%),
    radial-gradient(ellipse 6px 8px at 50% 84%, #888 60%, transparent 100%);
}

.page-bg {
  background:
    radial-gradient(ellipse at 50% 0%, rgba(50,40,20,0.4) 0%, transparent 70%),
    linear-gradient(180deg, #0e0d14 0%, #12111a 100%);
  border-radius: 2px 8px 8px 2px;
  padding: 12px;
  flex: 1;
}

/* ── GRID ───────────────────────────────────────────── */
#page {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

/* ── SLEEVE ─────────────────────────────────────────── */
.sleeve {
  background: var(--sleeve-bg);
  border: 1px solid var(--sleeve-border);
  border-radius: 8px;
  aspect-ratio: 5/7;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  cursor: pointer;
  position: relative;
  transition: transform 0.2s, box-shadow 0.2s;
  /* glossy top sheen */
  background-image: linear-gradient(
    160deg,
    rgba(255,255,255,0.08) 0%,
    transparent 50%
  );
}
.sleeve:active {
  transform: scale(0.96);
}
.sleeve img,
.sleeve video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 6px;
  display: block;
}

/* ── NAV ────────────────────────────────────────────── */
#nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 12px;
  padding: 0 2px;
}
.nav-btn {
  background: rgba(201,168,76,0.12);
  border: 1px solid rgba(201,168,76,0.3);
  color: var(--gold-light);
  border-radius: 8px;
  width: 48px; height: 48px;
  font-size: 20px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.15s;
  font-family: serif;
}
.nav-btn:active { background: rgba(201,168,76,0.3); }
.nav-btn:disabled { opacity: 0.2; pointer-events: none; }

#page-indicator {
  font-size: 12px;
  color: rgba(201,168,76,0.6);
  letter-spacing: 0.12em;
}

/* ── OVERLAY ─────────────────────────────────────────── */
#overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  pointer-events: none;
  transition: background 0.3s;
}
#overlay.open {
  background: rgba(0,0,0,0.92);
  pointer-events: all;
}

#overlay-card {
  width: min(300px, 78vw);
  aspect-ratio: 5/7;
  border-radius: 10px;
  overflow: hidden;
  position: relative;
  transform: scale(0.6);
  opacity: 0;
  transition: transform 0.35s cubic-bezier(0.34, 1.4, 0.64, 1), opacity 0.25s ease;
  box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 0 1px rgba(201,168,76,0.2);
}
#overlay.open #overlay-card {
  transform: scale(1);
  opacity: 1;
}
#overlay-card img,
#overlay-card video {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}

.ov-arrow {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  color: white;
  font-size: 24px;
  width: 44px; height: 64px;
  border-radius: 8px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
  z-index: 101;
}
.ov-arrow:active { background: rgba(255,255,255,0.25); }
.ov-arrow:disabled { opacity: 0.15; pointer-events: none; }
#ov-prev { left: 8px; }
#ov-next { right: 8px; }

#ov-close {
  position: fixed;
  top: 16px; right: 16px;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.2);
  color: white;
  font-size: 18px;
  width: 40px; height: 40px;
  border-radius: 50%;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  display: flex; align-items: center; justify-content: center;
  z-index: 102;
  transition: background 0.15s;
}
#ov-close:active { background: rgba(255,255,255,0.3); }

#ov-counter {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 12px;
  color: rgba(255,255,255,0.45);
  letter-spacing: 0.1em;
  z-index: 102;
}
</style>
</head>
<body>

<!-- COVER -->
<div id="scene">
  <div id="cover-wrap">
    <div id="cover">
      <div class="cover-border"></div>
      <div class="cover-border-inner"></div>
      <div class="cover-ornament">✦</div>
      <div class="cover-title">La<br>Collezione</div>
      <div class="cover-subtitle">Carte Collezionabili</div>
      <div class="cover-ornament">✦</div>
      <div class="cover-hint">Tocca per aprire</div>
    </div>
  </div>

  <!-- BINDER (behind cover) -->
  <div id="binder">
    <div class="page-bg">
      <div id="page"></div>
    </div>
    <div id="nav">
      <button class="nav-btn" id="prev-btn">&#8592;</button>
      <span id="page-indicator"></span>
      <button class="nav-btn" id="next-btn">&#8594;</button>
    </div>
  </div>
</div>

<!-- OVERLAY -->
<div id="overlay">
  <button class="ov-arrow" id="ov-prev">&#8592;</button>
  <div id="overlay-card"></div>
  <button class="ov-arrow" id="ov-next">&#8594;</button>
  <button id="ov-close">&#10005;</button>
  <span id="ov-counter"></span>
</div>

<script>
// ── CONFIGURATION ──────────────────────────────────────────
// Modifica questo array con i tuoi file nella cartella /carte/
// type: 'img' per immagini (jpg, png, svg, webp), 'video' per mp4
const CARTE = [
  { file: 'carta_01.svg', type: 'img' },
  { file: 'carta_02.svg', type: 'img' },
  { file: 'carta_03.svg', type: 'img' },
  { file: 'carta_04.svg', type: 'img' },
  { file: 'carta_05.svg', type: 'img' },
  { file: 'carta_06.svg', type: 'img' },
  { file: 'carta_07.svg', type: 'img' },
  { file: 'carta_08.svg', type: 'img' },
];

const PER_PAGE = 4;

// ── STATE ──────────────────────────────────────────────────
let page = 0;
let ovIdx = 0;
const totalPages = () => Math.ceil(CARTE.length / PER_PAGE);

// ── HELPERS ────────────────────────────────────────────────
function makeMedia(carta) {
  if (carta.type === 'video') {
    const v = document.createElement('video');
    v.src = `carte/${carta.file}`;
    v.autoplay = true; v.muted = true; v.loop = true; v.playsInline = true;
    return v;
  }
  const img = document.createElement('img');
  img.src = `carte/${carta.file}`;
  img.alt = '';
  return img;
}

// ── RENDER PAGE ────────────────────────────────────────────
function renderPage() {
  const grid = document.getElementById('page');
  grid.innerHTML = '';
  const start = page * PER_PAGE;

  CARTE.slice(start, start + PER_PAGE).forEach((carta, i) => {
    const idx = start + i;
    const sleeve = document.createElement('div');
    sleeve.className = 'sleeve';
    sleeve.appendChild(makeMedia(carta));
    sleeve.addEventListener('click', () => openOverlay(idx));
    grid.appendChild(sleeve);
  });

  document.getElementById('page-indicator').textContent = `${page + 1} / ${totalPages()}`;
  document.getElementById('prev-btn').disabled = page === 0;
  document.getElementById('next-btn').disabled = page === totalPages() - 1;
}

// ── OVERLAY ────────────────────────────────────────────────
function openOverlay(idx) {
  ovIdx = idx;
  renderOverlayCard();
  document.getElementById('overlay').classList.add('open');
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('open');
  // clear media after transition ends
  setTimeout(() => { document.getElementById('overlay-card').innerHTML = ''; }, 350);
}

function renderOverlayCard() {
  const card = document.getElementById('overlay-card');
  // animate out then in for card change
  card.style.transition = 'none';
  card.style.opacity = '0';
  card.style.transform = 'scale(0.85)';

  requestAnimationFrame(() => {
    card.innerHTML = '';
    card.appendChild(makeMedia(CARTE[ovIdx]));
    card.style.transition = 'transform 0.3s cubic-bezier(0.34, 1.3, 0.64, 1), opacity 0.2s ease';
    requestAnimationFrame(() => {
      card.style.opacity = '1';
      card.style.transform = 'scale(1)';
    });
  });

  document.getElementById('ov-counter').textContent = `${ovIdx + 1} / ${CARTE.length}`;
  document.getElementById('ov-prev').disabled = ovIdx === 0;
  document.getElementById('ov-next').disabled = ovIdx === CARTE.length - 1;
}

// ── EVENTS ────────────────────────────────────────────────
document.getElementById('prev-btn').onclick = () => { page--; renderPage(); };
document.getElementById('next-btn').onclick = () => { page++; renderPage(); };

document.getElementById('ov-close').onclick = closeOverlay;
document.getElementById('ov-prev').onclick = () => { ovIdx--; renderOverlayCard(); };
document.getElementById('ov-next').onclick = () => { ovIdx++; renderOverlayCard(); };

document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closeOverlay();
});

// Swipe gesture on overlay
let tx = 0;
document.getElementById('overlay').addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive: true });
document.getElementById('overlay').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) < 40) return;
  if (dx < 0 && ovIdx < CARTE.length - 1) { ovIdx++; renderOverlayCard(); }
  if (dx > 0 && ovIdx > 0) { ovIdx--; renderOverlayCard(); }
});

// ── COVER OPEN ────────────────────────────────────────────
document.getElementById('cover-wrap').addEventListener('click', () => {
  document.getElementById('cover-wrap').classList.add('opened');
  document.getElementById('binder').classList.add('visible');
  renderPage();
});

// position cover exactly over binder on load
function positionCover() {
  const binder = document.getElementById('binder');
  const rect = binder.getBoundingClientRect();
  const wrap = document.getElementById('cover-wrap');
  wrap.style.top = rect.top + 'px';
  wrap.style.left = rect.left + 'px';
  wrap.style.width = rect.width + 'px';
  wrap.style.transform = 'none'; // override the centering default
}

window.addEventListener('load', positionCover);
window.addEventListener('resize', positionCover);
</script>
</body>
</html>
