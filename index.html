<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Raccoglitore</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold: #c9a84c;
  --gold-light: #e8cc80;
  --leather-dark: #1c0f07;
  --leather-mid: #2e1a0a;
  --velvet: #12111a;
  --text: #f0e6d3;
}

html, body {
  min-height: 100%;
  background: radial-gradient(ellipse at center, #1a1530 0%, #0a0910 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Cinzel', serif;
  color: var(--text);
  overscroll-behavior: none;
  padding: 16px 0;
}

/* ── STACK: binder + cover sovrapposta ── */
#stack {
  position: relative;
  width: min(400px, 94vw);
  perspective: 1200px;
}

/* ── BINDER ── */
#binder {
  background: var(--leather-mid);
  border-radius: 4px 14px 14px 4px;
  padding: 16px 14px 12px 28px;
  position: relative;
  box-shadow: 6px 6px 24px rgba(0,0,0,0.8);
}
/* dorso sinistra */
#binder::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0; width: 20px;
  background: linear-gradient(90deg, #0d0704, #1a0c05, #0d0704);
  border-radius: 4px 0 0 4px;
}
/* anelli */
#binder::after {
  content: '';
  position: absolute;
  left: 4px; top: 50%; transform: translateY(-50%);
  width: 12px; height: 160px;
  background:
    radial-gradient(ellipse 6px 8px at 50% 16%, #999 60%, transparent 100%),
    radial-gradient(ellipse 6px 8px at 50% 50%, #999 60%, transparent 100%),
    radial-gradient(ellipse 6px 8px at 50% 84%, #999 60%, transparent 100%);
}

.page-bg {
  background: linear-gradient(180deg, #0e0d14 0%, #12111a 100%);
  border-radius: 4px 8px 8px 4px;
  padding: 12px;
}

#page {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.sleeve {
  background: rgba(200,180,140,0.07);
  border: 1px solid rgba(201,168,76,0.22);
  border-radius: 8px;
  aspect-ratio: 5/7;
  overflow: hidden;
  cursor: pointer;
  position: relative;
  /* glossy sheen */
  background-image: linear-gradient(155deg, rgba(255,255,255,0.07) 0%, transparent 45%);
  transition: transform 0.18s;
  -webkit-tap-highlight-color: transparent;
}
.sleeve:active { transform: scale(0.95); }
.sleeve img, .sleeve video {
  width: 100%; height: 100%;
  object-fit: cover;
  border-radius: 6px;
  display: block;
}

#nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 12px;
}
.nav-btn {
  background: rgba(201,168,76,0.1);
  border: 1px solid rgba(201,168,76,0.28);
  color: var(--gold-light);
  border-radius: 8px;
  width: 52px; height: 52px;
  font-size: 22px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.15s;
}
.nav-btn:active { background: rgba(201,168,76,0.28); }
.nav-btn:disabled { opacity: 0.2; pointer-events: none; }
#page-indicator { font-size: 12px; color: rgba(201,168,76,0.55); letter-spacing: 0.1em; }

/* ── COVER (sovrapposta al binder, stesso genitore) ── */
#cover-wrap {
  position: absolute;
  inset: 0;
  transform-origin: left center;
  transform-style: preserve-3d;
  transition: transform 0.75s cubic-bezier(0.4, 0, 0.2, 1);
  cursor: pointer;
  z-index: 10;
  border-radius: 4px 14px 14px 4px;
}
#cover-wrap.opened {
  transform: rotateY(-175deg);
  pointer-events: none;
}

#cover {
  width: 100%; height: 100%;
  background:
    repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(255,255,255,0.012) 2px, rgba(255,255,255,0.012) 4px),
    linear-gradient(180deg, #251408 0%, #1c0f07 50%, #251408 100%);
  border-radius: 4px 14px 14px 4px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  box-shadow: 6px 6px 24px rgba(0,0,0,0.8), inset -2px 0 8px rgba(0,0,0,0.5);
  backface-visibility: hidden;
  padding: 24px 20px;
}
#cover::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0; width: 20px;
  background: linear-gradient(90deg, #0d0704, #1a0c05, #0d0704);
  border-radius: 4px 0 0 4px;
}
#cover::after {
  content: '';
  position: absolute;
  left: 4px; top: 50%; transform: translateY(-50%);
  width: 12px; height: 160px;
  background:
    radial-gradient(ellipse 6px 8px at 50% 16%, #999 60%, transparent 100%),
    radial-gradient(ellipse 6px 8px at 50% 50%, #999 60%, transparent 100%),
    radial-gradient(ellipse 6px 8px at 50% 84%, #999 60%, transparent 100%);
}

.cover-border {
  position: absolute; inset: 14px;
  border: 1px solid var(--gold); border-radius: 8px; opacity: 0.45; pointer-events: none;
}
.cover-title {
  font-size: clamp(24px, 7vw, 32px); font-weight: 600;
  color: var(--gold); text-align: center; letter-spacing: 0.12em;
  text-shadow: 0 0 22px rgba(201,168,76,0.45); line-height: 1.4;
  position: relative; z-index: 1;
}
.cover-sub {
  font-family: 'IM Fell English', serif; font-style: italic;
  font-size: 13px; color: rgba(201,168,76,0.55); margin-top: 10px; letter-spacing: 0.05em;
}
.cover-gem { font-size: 32px; color: var(--gold); opacity: 0.5; margin: 14px 0; line-height: 1; }
.cover-hint {
  position: absolute; bottom: 24px;
  font-size: 10px; color: rgba(240,230,211,0.3);
  letter-spacing: 0.14em; text-transform: uppercase;
}

/* ── OVERLAY ── */
#overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
  pointer-events: none;
  transition: background 0.3s;
}
#overlay.open { background: rgba(0,0,0,0.92); pointer-events: all; }

#overlay-card {
  width: min(300px, 78vw); aspect-ratio: 5/7;
  border-radius: 10px; overflow: hidden;
  transform: scale(0.5); opacity: 0;
  transition: transform 0.35s cubic-bezier(0.34, 1.45, 0.64, 1), opacity 0.25s ease;
  box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 0 1px rgba(201,168,76,0.2);
}
#overlay.open #overlay-card { transform: scale(1); opacity: 1; }
#overlay-card img, #overlay-card video { width: 100%; height: 100%; object-fit: cover; display: block; }

.ov-arrow {
  position: fixed; top: 50%; transform: translateY(-50%);
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
  color: white; font-size: 24px; width: 44px; height: 64px;
  border-radius: 8px; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s; z-index: 101;
}
.ov-arrow:active { background: rgba(255,255,255,0.25); }
.ov-arrow:disabled { opacity: 0.15; pointer-events: none; }
#ov-prev { left: 8px; } #ov-next { right: 8px; }

#ov-close {
  position: fixed; top: 16px; right: 16px;
  background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
  color: white; font-size: 18px; width: 42px; height: 42px;
  border-radius: 50%; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  display: flex; align-items: center; justify-content: center;
  z-index: 102; transition: background 0.15s;
}
#ov-close:active { background: rgba(255,255,255,0.3); }

#ov-counter {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  font-size: 12px; color: rgba(255,255,255,0.4); letter-spacing: 0.1em; z-index: 102;
}
</style>
</head>
<body>

<div id="stack">
  <!-- BINDER (sotto) -->
  <div id="binder">
    <div class="page-bg">
      <div id="page"></div>
    </div>
    <div id="nav">
      <button class="nav-btn" id="prev-btn">&#8592;</button>
      <span id="page-indicator"></span>
      <button class="nav-btn" id="next-btn">&#8594;</button>
    </div>
  </div>

  <!-- COVER (sopra, stessa dimensione del binder) -->
  <div id="cover-wrap">
    <div id="cover">
      <div class="cover-border"></div>
      <div class="cover-gem">✦</div>
      <div class="cover-title">La<br>Collezione</div>
      <div class="cover-sub">Carte Collezionabili</div>
      <div class="cover-gem">✦</div>
      <div class="cover-hint">Tocca per aprire</div>
    </div>
  </div>
</div>

<!-- OVERLAY -->
<div id="overlay">
  <button class="ov-arrow" id="ov-prev">&#8592;</button>
  <div id="overlay-card"></div>
  <button class="ov-arrow" id="ov-next">&#8594;</button>
  <button id="ov-close">&#10005;</button>
  <span id="ov-counter"></span>
</div>

<script>
// ── NAMING CONVENTION ──────────────────────────────────────
// Metti i file nella cartella /carte/ con nomi:
//   carta_01.jpg  carta_02.jpg  carta_03.mp4  ecc.
// Formati supportati: jpg, jpeg, png, webp, gif, svg, mp4, webm
// Il codice le trova automaticamente — non serve toccare nulla.

const PER_PAGE = 4;
const EXTENSIONS = ['jpg','jpeg','png','webp','gif','svg','mp4','webm'];
const VIDEO_EXT  = new Set(['mp4','webm']);

// ── STATE ──────────────────────────────────────────────────
let CARTE = [];
let page = 0;
let ovIdx = 0;

// ── AUTO-DISCOVERY ─────────────────────────────────────────
// Prova carta_01, carta_02, … finché non riceve un errore 404.
// Per ogni numero prova tutte le estensioni in ordine.
function probeCard(n) {
  const name = `carta_${String(n).padStart(2,'0')}`;
  return new Promise(resolve => {
    let i = 0;
    function tryNext() {
      if (i >= EXTENSIONS.length) { resolve(null); return; }
      const ext = EXTENSIONS[i++];
      const isVideo = VIDEO_EXT.has(ext);
      const el = isVideo ? document.createElement('video') : new Image();
      el.onload  = () => resolve({ file: `${name}.${ext}`, type: isVideo ? 'video' : 'img' });
      el.onerror = tryNext;
      if (isVideo) { el.src = `carte/${name}.${ext}`; el.load(); }
      else         { el.src = `carte/${name}.${ext}`; }
    }
    tryNext();
  });
}

async function discoverCarte() {
  let n = 1;
  while (true) {
    const carta = await probeCard(n);
    if (!carta) break;
    CARTE.push(carta);
    n++;
  }
}

// ── HELPERS ────────────────────────────────────────────────
function makeMedia(carta) {
  if (carta.type === 'video') {
    return Object.assign(document.createElement('video'), {
      src: `carte/${carta.file}`, autoplay: true, muted: true, loop: true, playsInline: true
    });
  }
  return Object.assign(document.createElement('img'), { src: `carte/${carta.file}`, alt: '' });
}

// ── RENDER ─────────────────────────────────────────────────
function renderPage() {
  const grid = document.getElementById('page');
  grid.innerHTML = '';
  const start = page * PER_PAGE;
  const total = Math.ceil(CARTE.length / PER_PAGE);

  CARTE.slice(start, start + PER_PAGE).forEach((carta, i) => {
    const idx = start + i;
    const sleeve = document.createElement('div');
    sleeve.className = 'sleeve';
    sleeve.appendChild(makeMedia(carta));
    sleeve.addEventListener('click', () => openOverlay(idx));
    grid.appendChild(sleeve);
  });

  document.getElementById('page-indicator').textContent = `${page + 1} / ${total}`;
  document.getElementById('prev-btn').disabled = page === 0;
  document.getElementById('next-btn').disabled = page >= Math.ceil(CARTE.length / PER_PAGE) - 1;
}

// ── OVERLAY ────────────────────────────────────────────────
function openOverlay(idx) {
  ovIdx = idx;
  renderOverlayCard();
  document.getElementById('overlay').classList.add('open');
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('open');
  setTimeout(() => { document.getElementById('overlay-card').innerHTML = ''; }, 350);
}

function renderOverlayCard() {
  const card = document.getElementById('overlay-card');
  card.style.cssText = 'transition:none; opacity:0; transform:scale(0.85)';
  card.innerHTML = '';
  card.appendChild(makeMedia(CARTE[ovIdx]));

  requestAnimationFrame(() => requestAnimationFrame(() => {
    card.style.cssText = 'transition: transform 0.3s cubic-bezier(0.34,1.3,0.64,1), opacity 0.2s ease; opacity:1; transform:scale(1)';
  }));

  document.getElementById('ov-counter').textContent = `${ovIdx + 1} / ${CARTE.length}`;
  document.getElementById('ov-prev').disabled = ovIdx === 0;
  document.getElementById('ov-next').disabled = ovIdx === CARTE.length - 1;
}

// ── EVENTS ─────────────────────────────────────────────────
document.getElementById('prev-btn').onclick = () => { page--; renderPage(); };
document.getElementById('next-btn').onclick = () => { page++; renderPage(); };
document.getElementById('ov-close').onclick = closeOverlay;
document.getElementById('ov-prev').onclick = () => { ovIdx--; renderOverlayCard(); };
document.getElementById('ov-next').onclick = () => { ovIdx++; renderOverlayCard(); };
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeOverlay();
});

// Swipe su overlay
let tx = 0;
document.getElementById('overlay').addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive: true });
document.getElementById('overlay').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) < 40) return;
  if (dx < 0 && ovIdx < CARTE.length - 1) { ovIdx++; renderOverlayCard(); }
  if (dx > 0 && ovIdx > 0) { ovIdx--; renderOverlayCard(); }
});

// ── APERTURA COPERTINA ─────────────────────────────────────
document.getElementById('cover-wrap').addEventListener('click', async () => {
  if (!CARTE.length) await discoverCarte();
  if (!CARTE.length) return; // nessuna carta trovata
  document.getElementById('cover-wrap').classList.add('opened');
  renderPage();
});
</script>
</body>
</html>
